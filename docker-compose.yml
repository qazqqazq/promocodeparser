version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: promohub_db
    environment:
      POSTGRES_USER: promohub
      POSTGRES_PASSWORD: promohub_secret
      POSTGRES_DB: promohub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promohub"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: promohub_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://promohub:promohub_secret@db:5432/promohub
      SECRET_KEY: super-secret-key-for-jwt-tokens-2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
